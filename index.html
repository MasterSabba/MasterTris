<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tris Pro - Vincita</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { 
            --bg: #1a0633; 
            --card: #2d0a4e; 
            --yellow: #ffd700; 
            --cell: #3b1263;
            --text: #ffffff;
            --win: #4ade80;
            --lose: #f43f5e;
        }

        body { 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }

        .container { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 24px; 
            width: 320px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            border: 2px solid rgba(255, 215, 0, 0.3);
            position: relative;
        }

        .hidden { display: none !important; }
        h1 { color: var(--yellow); font-size: 2.2rem; margin-bottom: 10px; }
        .pts-display { font-size: 0.9rem; font-weight: bold; color: var(--yellow); margin-bottom: 20px; }

        input { 
            width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 12px; 
            border: 2px solid var(--cell); background: var(--bg); color: white; box-sizing: border-box; outline: none;
        }

        button { 
            width: 100%; padding: 14px; margin: 6px 0; border: none; border-radius: 12px; 
            font-weight: bold; cursor: pointer; background: var(--yellow); color: var(--bg); 
            font-size: 1rem; transition: 0.2s;
        }
        button:active { transform: scale(0.95); }
        .btn-outline { background: transparent; border: 2px solid var(--yellow); color: var(--yellow); }

        /* Griglia */
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .cell { 
            aspect-ratio: 1; background: var(--cell); display: flex; align-items: center; 
            justify-content: center; font-size: 2.5rem; font-weight: bold;
            border-radius: 16px; cursor: pointer; color: var(--yellow);
        }

        /* Overlay Risultato */
        #result-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 6, 51, 0.95); border-radius: 24px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 10;
        }
        #result-title { font-size: 2.5rem; margin-bottom: 20px; text-transform: uppercase; }
        .win-text { color: var(--win); text-shadow: 0 0 10px var(--win); }
        .lose-text { color: var(--lose); text-shadow: 0 0 10px var(--lose); }
        .tie-text { color: var(--yellow); }

        #code-display { background: #000; padding: 10px; border-radius: 8px; color: #00ff88; font-family: monospace; margin: 10px 0; border: 1px solid #00ff88; }
    </style>
</head>
<body>

<div class="container">
    <div id="result-overlay" class="hidden">
        <h2 id="result-title">VINTO!</h2>
        <button onclick="rematch()" style="width: 80%;">RIGIOCA</button>
        <button class="btn-outline" onclick="resetApp()" style="width: 80%;">MENU</button>
    </div>

    <div id="view-main">
        <h1>TRIS</h1>
        <div class="pts-display">PUNTI: <span id="val-pts">0</span></div>
        <input type="text" id="inp-name" placeholder="Tuo Nome" maxlength="12">
        <button onclick="goBot()">SFIDA IL BOT</button>
        <button onclick="switchView('view-multi')">MULTIPLAYER</button>
    </div>

    <div id="view-multi" class="hidden">
        <h1>MODALITÀ</h1>
        <button class="btn-outline" onclick="goLocal()">STESSO IPAD</button>
        <hr style="border: 0.5px solid rgba(255,255,255,0.1); margin: 20px 0;">
        <button onclick="hostOnline()">CREA STANZA</button>
        <div id="code-display" class="hidden"></div>
        <input type="text" id="inp-code" placeholder="Codice Amico">
        <button onclick="joinOnline()">ENTRA</button>
        <button class="btn-outline" onclick="switchView('view-main')" style="margin-top: 15px;">INDIETRO</button>
    </div>

    <div id="view-game" class="hidden">
        <div id="status-msg" style="color: var(--yellow); margin-bottom: 10px; font-weight: bold;"></div>
        <div class="grid" id="main-grid">
            <div class="cell" onclick="tap(0)"></div>
            <div class="cell" onclick="tap(1)"></div>
            <div class="cell" onclick="tap(2)"></div>
            <div class="cell" onclick="tap(3)"></div>
            <div class="cell" onclick="tap(4)"></div>
            <div class="cell" onclick="tap(5)"></div>
            <div class="cell" onclick="tap(6)"></div>
            <div class="cell" onclick="tap(7)"></div>
            <div class="cell" onclick="tap(8)"></div>
        </div>
        <button class="btn-outline" onclick="resetApp()">ESCI</button>
    </div>
</div>

<script>
    let board = Array(9).fill("");
    let turn = "X";
    let active = false;
    let mode = ""; 
    let p1 = "Io", p2 = "Avversario";
    let peer, conn, role;

    let score = parseInt(localStorage.getItem('tris_score')) || 0;
    document.getElementById('val-pts').innerText = score;

    function switchView(id) {
        document.querySelectorAll('.container > div').forEach(div => {
            if(div.id !== 'result-overlay') div.classList.add('hidden');
        });
        document.getElementById(id).classList.remove('hidden');
    }

    function resetApp() {
        if(peer) peer.destroy();
        document.getElementById('result-overlay').classList.add('hidden');
        board = Array(9).fill("");
        turn = "X";
        document.querySelectorAll('.cell').forEach(c => c.innerText = "");
        switchView('view-main');
    }

    function rematch() {
        board = Array(9).fill("");
        turn = "X";
        document.querySelectorAll('.cell').forEach(c => c.innerText = "");
        document.getElementById('result-overlay').classList.add('hidden');
        active = true;
        updateStatus();
    }

    function goBot() { mode = 'bot'; p1 = document.getElementById('inp-name').value || "Io"; p2 = "BOT"; startGame(); }
    function goLocal() { mode = 'local'; p1 = "G1"; p2 = "G2"; startGame(); }

    function startGame() {
        switchView('view-game');
        active = true;
        updateStatus();
    }

    function tap(i) {
        if(board[i] !== "" || !active) return;
        if(mode === 'online') {
            if(!((role==='host' && turn==='X') || (role==='guest' && turn==='O'))) return;
            conn.send({idx: i});
        }
        place(i);
        if(active && mode === 'bot' && turn === 'O') { active = false; setTimeout(botLogic, 500); }
    }

    function place(i) {
        board[i] = turn;
        document.querySelectorAll('.cell')[i].innerText = turn;
        
        if(checkWin(board, turn)) {
            showEndScreen(turn === 'X' ? 'win' : 'lose');
            active = false; return;
        }
        if(!board.includes("")) { showEndScreen('tie'); active = false; return; }
        
        turn = (turn === "X") ? "O" : "X";
        updateStatus();
    }

    function showEndScreen(result) {
        const overlay = document.getElementById('result-overlay');
        const title = document.getElementById('result-title');
        overlay.classList.remove('hidden');
        
        if(result === 'win') {
            title.innerText = "HAI VINTO!";
            title.className = "win-text";
            if(mode !== 'local') {
                score += 10;
                localStorage.setItem('tris_score', score);
                document.getElementById('val-pts').innerText = score;
            }
        } else if(result === 'lose') {
            title.innerText = (mode === 'local') ? "VINCE O!" : "HAI PERSO!";
            title.className = "lose-text";
        } else {
            title.innerText = "PAREGGIO";
            title.className = "tie-text";
        }
    }

    function updateStatus() { document.getElementById('status-msg').innerText = "Turno: " + (turn==='X'?p1:p2); }
    function checkWin(b, p) { return [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]].some(l => l.every(idx => b[idx]===p)); }

    // BOT & ONLINE (stessa logica di prima)
    function botLogic() {
        let best = -100, move = -1;
        for(let i=0; i<9; i++) { if(board[i]==="") { board[i]="O"; let s = minimax(board, false); board[i]=""; if(s > best) { best = s; move = i; } } }
        active = true; place(move);
    }
    function minimax(b, isMax) {
        if(checkWin(b, "O")) return 10; if(checkWin(b, "X")) return -10; if(!b.includes("")) return 0;
        let scores = [];
        for(let i=0; i<9; i++) if(b[i]==="") { b[i]=isMax?"O":"X"; scores.push(minimax(b, !isMax)); b[i]=""; }
        return isMax ? Math.max(...scores) : Math.min(...scores);
    }
    function hostOnline() {
        const id = Math.random().toString(36).substring(2, 7).toUpperCase();
        peer = new Peer(id);
        peer.on('open', code => { const el = document.getElementById('code-display'); el.innerText = "CODICE: " + code; el.classList.remove('hidden'); });
        peer.on('connection', c => { conn = c; role = 'host'; mode = 'online'; conn.on('open', () => { p1 = document.getElementById('inp-name').value || "Host"; conn.send({name: p1}); startGame(); }); conn.on('data', d => handleOnlineData(d)); });
    }
    function joinOnline() {
        const code = document.getElementById('inp-code').value.toUpperCase(); if(!code) return;
        peer = new Peer();
        peer.on('open', () => { conn = peer.connect(code); role = 'guest'; mode = 'online'; conn.on('open', () => { p2 = document.getElementById('inp-name').value || "Guest"; conn.send({name: p2}); startGame(); }); conn.on('data', d => handleOnlineData(d)); });
    }
    function handleOnlineData(d) { if(d.name) { if(role==='host') p2 = d.name; else p1 = d.name; updateStatus(); } if(d.idx !== undefined) place(d.idx); }
</script>

</body>
</html>
